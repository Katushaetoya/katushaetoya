<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Наша дата 💖</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(120deg, #ffd6e0, #ffeef5);
  color: black;
  text-align: center;
  overflow-x: hidden;
}

/* Заголовок */
h1 {
  margin-top: 40px;
  font-size: 40px;
  text-shadow: 
    -2px -2px 0 white,
     2px -2px 0 white,
    -2px  2px 0 white,
     2px  2px 0 white;
}

/* Счётчик */
#timer {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* Открывающаяся открытка */
#card {
  max-width: 700px;
  margin: 40px auto;
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  overflow: hidden;
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 1.2s ease;
}

/* Внутренний блок с текстом */
#date {
  padding: 25px;
  font-size: 20px;
  line-height: 1.6;
  min-height: 200px;
  color: black;
  text-shadow: 
    -1px -1px 0 white,
     1px -1px 0 white,
    -1px  1px 0 white,
     1px  1px 0 white;
}

/* Сердечки падающие */
.heart {
  position: fixed;
  top: -10px;
  color: #ff4d6d;
  font-size: 20px;
  animation: fall linear forwards;
}
@keyframes fall { to { transform: translateY(100vh); } }
</style>
</head>
<body>

<h1>💞 Правильно! 💞</h1>

<div id="timer"></div>

<!-- Карточка -->
<div id="card">
  <div id="date"></div>
</div>

<script>
// ❤️ ТЕКСТ (для эффекта печати)
const text = `14.02.2026 — тот самый день, который разделил нашу жизнь на до и после.

Знаешь, я долго думала, как это всё сказать словами… но никакие слова не передают то, что я чувствую к тебе.

Ты стал для меня чем-то гораздо большим. С тобой я настоящая.

Я люблю в тебе всё. Ты стал частью моего мира.

Я искренне люблю тебя 💔❤️`;

// ✍️ Эффект печати
let i = 0;
function typeWriter() {
  const dateDiv = document.getElementById("date");
  if (i < text.length) {
    dateDiv.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

// ⏳ Счётчик
const startDate = new Date("2026-02-14T00:00:00");
function updateTimer() {
  const now = new Date();
  const diff = now - startDate;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  document.getElementById("timer").innerHTML =
    `⏳ Мы вместе: ${days} дней ${hours} часов ${minutes} минут 💞`;
}
setInterval(updateTimer, 1000);
updateTimer();

// 💌 Открытие карточки с анимацией
window.onload = function() {
  const card = document.getElementById("card");
  setTimeout(() => {
    card.style.transform = "scaleY(1)";
    typeWriter(); // запускаем печатающийся текст после раскрытия
  }, 500);
};

// 💖 падающие сердечки
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
for (let i = 0; i < 30; i++) {
  setTimeout(createHeart, i * 100);
}

// 💓 сердечки при клике
document.addEventListener("click", function(e) {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "fixed";
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";
  heart.style.fontSize = "24px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
});
</script>

</body>
</html>
