<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя мой самый любимый Витюшкинс ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: black;
  position: relative;
  height: 100vh;
}

/* ЗВЁЗДЫ */
#stars { position: fixed; width: 100%; height: 100%; z-index: -1; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
@keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

/* ЗАТЕМНЕНИЕ */
#fade { position: fixed; width: 100%; height: 100%; background: black; opacity: 0; transition: 1s; z-index: 9998; }

/* ДВЕРИ */
.door { position: fixed; width: 50%; height: 100%; top: 0; background: #111; z-index: 9999; transition: transform 1.5s ease; }
#leftDoor { left: 0; }
#rightDoor { right: 0; }
.open #leftDoor { transform: translateX(-100%); }
.open #rightDoor { transform: translateX(100%); }

/* СТАРТ */
#startScreen {
  position: fixed; width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
  z-index: 10000;
}
#startScreen button {
  padding: 20px 50px; font-size: 24px; border-radius: 40px; border: 2px solid white;
  background: linear-gradient(45deg, purple, #a020f0); color: white; cursor: pointer;
  animation: pulse 1.5s infinite; box-shadow: 0 0 20px purple;
}
#startScreen button:hover { transform: scale(1.15); }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

/* САЙТ */
#mainContent { display: none; }
h1, p { text-shadow: 0 0 10px #ff4f7b; }

/* ГАЛЕРЕЯ */
.gallery { display: flex; justify-content: center; flex-wrap: wrap; margin:20px 0;}
.gallery img { width: 250px; height: 250px; object-fit: cover; border-radius: 15px; margin: 10px; transition: 0.3s; }
.gallery img:hover { transform: scale(1.1); }

/* КНОПКА РЕШИ ЗАДАЧКУ */
.taskBtn {
  padding: 20px 50px; font-size: 22px; border-radius: 40px; border: 2px solid white;
  background: linear-gradient(45deg, purple, #a020f0); color: white; cursor: pointer;
  animation: pulseBtn 1.5s infinite; box-shadow: 0 0 20px purple; margin:20px;
}
.taskBtn:hover { transform: scale(1.15); }
@keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

/* МОДАЛКА */
#taskModal {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.8); display: none; justify-content:center; align-items:center; z-index:10001;
}
.modalContent {
  background:#111; padding:30px; border-radius:20px; text-align:center;
  box-shadow:0 0 30px purple; animation: fadeIn 0.5s;
}
.modalContent input { padding:10px; border-radius:10px; border:none; width:200px; text-align:center; margin:5px; display:none; }
.numberHint { color:#8a2be2; font-size:13px; margin:3px 0; display:none; }

/* МЕРЦАНИЕ */
.glow {
  animation: glowAnim 1s infinite alternate;
}
@keyframes glowAnim {
  from { text-shadow: 0 0 5px #ff4f7b, 0 0 10px #ff4f7b; opacity:0.6; }
  to { text-shadow: 0 0 15px #ff4f7b, 0 0 25px #ff4f7b; opacity:1; }
}

/* АНИМАЦИИ */
.fadeText { opacity: 0; animation: fadeInText 1s forwards; }
@keyframes fadeInText { to { opacity:1; } }
@keyframes fadeIn { from {opacity:0; transform: scale(0.8);} to {opacity:1; transform: scale(1);} }
.shake { animation: shake 0.4s; }
@keyframes shake { 0% {transform:translateX(0);} 25% {transform:translateX(-5px);} 50% {transform:translateX(5px);} 75% {transform:translateX(-5px);} 100% {transform:translateX(0);} }
#resultText { margin-top:10px; height:24px; }
</style>
</head>

<body>

<div id="stars"></div>
<div id="fade"></div>
<div id="leftDoor" class="door"></div>
<div id="rightDoor" class="door"></div>

<div id="startScreen">
  <button onclick="openSite()">Открой 💜</button>
</div>

<div id="mainContent">
<h1>Для тебя 💖</h1>
<p>Мой самый любимый человек</p>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<audio id="doorSound"><source src="door.mp3" type="audio/mpeg"></audio>
<audio id="clickSound"><source src="click.mp3" type="audio/mpeg"></audio>

<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<button class="taskBtn" onclick="taskClick()">Реши задачку 💜</button>
</div>

<!-- МОДАЛКА -->
<div id="taskModal">
  <div class="modalContent" id="modalBox">
    <h2 class="fadeText">💜 Цепочка задач</h2>
    <p class="fadeText">Используй подсказки чисел:</p>

    <span class="numberHint glow" id="hint1">люблю = 1329</span>
    <span class="numberHint glow" id="hint2">котик = 1154</span>
    <span class="numberHint glow" id="hint3">пупс = 1615</span>
    <span class="numberHint glow" id="hint4">Катюшка = 410</span>
    <span class="numberHint glow" id="hint5">пупсик = 934</span>
    <span class="numberHint glow" id="hint6">магическое число = 22,85</span>

    <p class="fadeText">Введи результаты шагов по порядку:</p>

    <input type="number" id="step1" placeholder="Шаг 1">
    <input type="number" id="step2" placeholder="Шаг 2">
    <input type="number" id="step3" placeholder="Шаг 3">
    <input type="number" id="step4" placeholder="Шаг 4">
    <input type="number" id="step5" placeholder="Шаг 5">
    <input type="number" id="step6" placeholder="Шаг 6">

    <div id="resultText"></div>
    <br>
    <button onclick="checkTask()">Проверить 💖</button>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

<script>
// ЗВЁЗДЫ
for(let i=0;i<150;i++){
  let star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  star.style.width=1+Math.random()*2+'px';
  star.style.height=1+Math.random()*2+'px';
  document.getElementById('stars').appendChild(star);
}

// ОТКРЫТИЕ
function openSite(){
  if(navigator.vibrate) navigator.vibrate(100);
  document.getElementById('fade').style.opacity='1';
  document.getElementById('doorSound').play();
  setTimeout(()=>{ document.body.classList.add('open'); },300);
  setTimeout(()=>{
    document.getElementById('startScreen').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('fade').style.opacity='0';
    document.getElementById('music').play();
  },1800);
}

// ВЗРЫВ СЕРДЕЦ
function explodeHearts(x,y){
  for(let i=0;i<20;i++){
    let heart=document.createElement('div');
    heart.innerHTML='💖';
    heart.style.position='fixed';
    heart.style.left=x+'px';
    heart.style.top=y+'px';
    let angle=Math.random()*2*Math.PI;
    let dist=Math.random()*150;
    heart.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`,opacity:0}],{duration:800});
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),800);
  }
}

// КНОПКА ЗАДАЧКИ
function taskClick(){
  document.getElementById('clickSound').play();
  explodeHearts(window.innerWidth/2, window.innerHeight/2);
  setTimeout(()=>{document.getElementById('taskModal').style.display='flex'; showStepsSequentially();},300);
}
function closeModal(){document.getElementById('taskModal').style.display='none';}

// ПОШАГОВОЕ ПОЯВЛЕНИЕ С МЕРЦАНИЕМ
function showStepsSequentially(){
  const hints = ['hint1','hint2','hint3','hint4','hint5','hint6'];
  const steps = ['step1','step2','step3','step4','step5','step6'];
  hints.forEach((id,i)=>setTimeout(()=>document.getElementById(id).style.display='block', i*400));
  steps.forEach((id,i)=>setTimeout(()=>document.getElementById(id).style.display='inline-block', i*500+800));
}

// ПРОВЕРКА
function checkTask(){
  let vals = [];
  for(let i=1;i<=6;i++){ vals.push(parseFloat(document.getElementById('step'+i).value)); }
  const correct = [38, 34.97, 23.43, 25.16, 0.614, 14.02];
  let ok = true;
  for(let i=0;i<vals.length;i++){ if(Math.abs(vals[i]-correct[i])>0.01) ok=false; }

  const box=document.getElementById('modalBox');
  const result=document.getElementById('resultText');

  if(ok){
    explodeHearts(window.innerWidth/2, window.innerHeight/2);
    result.innerHTML="💖 Правильно!";
    result.style.color="#ff4f7b";
    setTimeout(()=>{ window.location.href="secret.html"; },1200);
  }else{
    result.innerHTML="😢 Неправильно";
    result.style.color="white";
    box.classList.add('shake');
    setTimeout(()=>box.classList.remove('shake'),400);
  }
}
</script>
</body>
</html>
