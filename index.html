<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя мой самый любимый Витюшкинс ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: black;
}

/* === ЗВЁЗДНЫЙ ФОН === */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  z-index: -1;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* === ЗАТЕМНЕНИЕ === */
#fade {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s;
  z-index: 9998;
}

/* === СТАРТОВЫЙ ЭКРАН === */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

/* КНОПКА */
#startScreen button {
  padding: 20px 50px;
  font-size: 24px;
  border-radius: 40px;
  border: 2px solid white;
  background: linear-gradient(45deg, purple, #a020f0);
  color: white;
  cursor: pointer;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 20px purple;
}

#startScreen button:hover {
  transform: scale(1.15);
  box-shadow: 0 0 40px #a020f0;
}

/* ПУЛЬС */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* === ДВЕРИ === */
.door {
  position: fixed;
  width: 50%;
  height: 100%;
  top: 0;
  background: #111;
  z-index: 9999;
  transition: transform 1.5s ease;
}

#leftDoor { left: 0; }
#rightDoor { right: 0; }

.open #leftDoor { transform: translateX(-100%); }
.open #rightDoor { transform: translateX(100%); }

/* === ОСНОВНОЙ КОНТЕНТ === */
#mainContent {
  display: none;
}

h1, p {
  text-shadow: 0 0 10px #ff4f7b;
}

.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 250px;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  margin: 10px;
  transition: transform 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

button.taskBtn {
  padding: 15px 30px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff4f7b, #ff758c);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ЗВЁЗДЫ -->
<div id="stars"></div>

<!-- ЗАТЕМНЕНИЕ -->
<div id="fade"></div>

<!-- ДВЕРИ -->
<div id="leftDoor" class="door"></div>
<div id="rightDoor" class="door"></div>

<!-- СТАРТ -->
<div id="startScreen">
  <button onclick="openSite()">Открой 💜</button>
</div>

<!-- САЙТ -->
<div id="mainContent">

<h1>Для тебя 💖</h1>
<p>Мой самый любимый человек</p>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<audio id="doorSound">
  <source src="door.mp3">
</audio>

<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<button class="taskBtn" onclick="checkTask()">Реши задачку 🔓</button>

</div>

<script>

// === ЗВЁЗДЫ ===
for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = (1 + Math.random() * 2) + "s";
  document.getElementById("stars").appendChild(star);
}

// === ОТКРЫТИЕ ===
function openSite() {

  // вибрация
  if (navigator.vibrate) {
    navigator.vibrate(100);
  }

  // затемнение
  document.getElementById("fade").style.opacity = "1";

  // звук двери
  document.getElementById("doorSound").play();

  setTimeout(() => {
    document.body.classList.add("open");
  }, 300);

  setTimeout(() => {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("fade").style.opacity = "0";
    document.getElementById("music").play();
  }, 1800);
}

// === СЕРДЕЧКИ ===
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "fixed";
  heart.style.top = "-30px";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 30) + "px";
  heart.style.animation = `fall 4s linear`;
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 4000);
}
setInterval(createHeart, 300);

const style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
  to { transform: translateY(100vh); opacity: 0; }
}
`;
document.head.appendChild(style);

// === ЗАДАЧКА ===
function checkTask() {
  let answer = prompt("Сколько месяцев мы знакомы?");
  if (answer === "82") {
    window.location.href = "secret.html";
  } else {
    alert("Неправильно 😢");
  }
}

</script>

</body>
</html>
