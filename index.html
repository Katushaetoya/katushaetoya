<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #000000; /* Черный фон */
  color: white;
  text-align: center;
  overflow-x: hidden;
}
h1, p {
  text-shadow: 0 0 10px #ff4f7b;
}
.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}
.gallery img {
  width: 250px;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  margin: 10px;
  transition: transform 0.3s;
}
.gallery img:hover {
  transform: scale(1.1);
}
button {
  padding: 15px 30px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff4f7b, #ff758c);
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin: 20px;
  transition: transform 0.2s, box-shadow 0.2s;
}
button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff4f7b;
}
</style>
</head>
<body>

<h1>Для тебя 💖</h1>
<p>Мой самый любимый человек</p>

<!-- Музыка -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Галерея -->
<div class="gallery">
  <img src="photo1.jpg" alt="Фото 1">
  <img src="photo2.jpg" alt="Фото 2">
  <img src="photo3.jpg" alt="Фото 3">
</div>

<!-- Кнопка задачки -->
<button onclick="checkTask()">Реши задачку 🔓</button>

<script>
// Падающие сердечки на главной странице
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "fixed";
  heart.style.top = "-30px";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 30) + "px";
  heart.style.color = "#ff4f7b";
  heart.style.zIndex = 9999;
  heart.style.pointerEvents = "none";
  heart.style.animation = `fall ${3 + Math.random()*3}s linear forwards`;
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// Анимация падения сердечек
const style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
`;
document.head.appendChild(style);

// Функция задачки
function checkTask() {
  let answer = prompt("А теперь прийдется немного подумать, сколько месяцев мы знакомы ?");
  if (answer === "82") {
    window.location.href = "secret.html";
  } else {
    alert("Неправильно 😢 Попробуй ещё раз");
  }
}
</script>

</body>
</html>
