<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя мой самый любимый Витюшкинс ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: black;
}

/* ЗВЁЗДЫ */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* ЗАТЕМНЕНИЕ */
#fade {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  transition: 1s;
  z-index: 9998;
}

/* СТАРТ */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

#startScreen button {
  padding: 20px 50px;
  font-size: 24px;
  border-radius: 40px;
  border: 2px solid white;
  background: linear-gradient(45deg, purple, #a020f0);
  color: white;
  cursor: pointer;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 20px purple;
}

#startScreen button:hover {
  transform: scale(1.15);
}

/* ПУЛЬС */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* ДВЕРИ */
.door {
  position: fixed;
  width: 50%;
  height: 100%;
  top: 0;
  background: #111;
  z-index: 9999;
  transition: transform 1.5s ease;
}

#leftDoor { left: 0; }
#rightDoor { right: 0; }

.open #leftDoor { transform: translateX(-100%); }
.open #rightDoor { transform: translateX(100%); }

/* САЙТ */
#mainContent {
  display: none;
}

h1, p {
  text-shadow: 0 0 10px #ff4f7b;
}

.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 250px;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  margin: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* КНОПКА ЗАДАЧИ */
.taskBtn {
  padding: 20px 50px;
  font-size: 22px;
  border-radius: 40px;
  border: 2px solid white;
  background: linear-gradient(45deg, purple, #a020f0);
  color: white;
  cursor: pointer;
  animation: pulseBtn 1.5s infinite;
  box-shadow: 0 0 20px purple;
}

.taskBtn:hover {
  transform: scale(1.15);
}

@keyframes pulseBtn {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="stars"></div>
<div id="fade"></div>

<div id="leftDoor" class="door"></div>
<div id="rightDoor" class="door"></div>

<div id="startScreen">
  <button onclick="openSite()">Открой 💜</button>
</div>

<div id="mainContent">

<h1>Для тебя 💖</h1>
<p>Мой самый любимый человек</p>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<audio id="doorSound">
  <source src="door.mp3">
</audio>

<audio id="clickSound">
  <source src="click.mp3">
</audio>

<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<button class="taskBtn" onclick="taskClick()">Реши задачку 💜</button>

</div>

<script>

// ЗВЁЗДЫ
for (let i = 0; i < 120; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";
  document.getElementById("stars").appendChild(star);
}

// ОТКРЫТИЕ
function openSite() {
  if (navigator.vibrate) navigator.vibrate(100);

  document.getElementById("fade").style.opacity = "1";
  document.getElementById("doorSound").play();

  setTimeout(() => {
    document.body.classList.add("open");
  }, 300);

  setTimeout(() => {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    document.getElementById("fade").style.opacity = "0";
    document.getElementById("music").play();
  }, 1800);
}

// 💥 ВЗРЫВ СЕРДЕЧЕК
function explodeHearts(x, y) {
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.left = x + "px";
    heart.style.top = y + "px";
    heart.style.fontSize = "20px";

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 150;

    heart.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`, opacity: 0 }
    ], {
      duration: 800,
      easing: "ease-out"
    });

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 800);
  }
}

// КЛИК ПО КНОПКЕ
function taskClick(event) {
  document.getElementById("clickSound").play();

  explodeHearts(window.innerWidth/2, window.innerHeight/2);

  setTimeout(() => {
    checkTask();
  }, 300);
}

// ЗАДАЧКА
function checkTask() {
  let answer = prompt("Сколько месяцев мы знакомы?");
  if (answer === "82") {
    window.location.href = "secret.html";
  } else {
    alert("Неправильно 😢");
  }
}

</script>

</body>
</html>
