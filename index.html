<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(120deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}
.gallery img {
  width: 250px;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  margin: 10px;
}
button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4f7b;
  cursor: pointer;
  margin: 10px;
}
</style>
</head>
<body>

<h1>Для тебя 💖</h1>
<p>Мой самый любимый человек</p>

<!-- Музыка -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Галерея -->
<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
</div>

<!-- Кнопка с задачкой -->
<button onclick="checkTask()">Реши задачку 🔓</button>

<script>
// Функция задачки
function checkTask() {
  let answer = prompt("Реши задачку 💕: 7 × 3 + 4 = ?");

  if (answer === "25") {
    // Переход на секретную страницу
    window.location.href = "secret.html";
  } else {
    alert("Неправильно 😢 Попробуй ещё раз");
  }
}
</script>
</body>
</html>
